[package]
name = "es-init"
version = "0.1.2"
description = "Initialize an Evolution Strategies adapter"
authors = ["In Gim <in.gim@yale.edu>"]
repository = "https://github.com/pie-project/pie"
readme = "README.md"

[runtime]
core = "^0.2.0"

[parameters]
name = {type = "string", description = "Name of the adapter to create or open"}
rank = {type = "int", description = "LoRA rank"}
alpha = {type = "float", description = "LoRA scaling factor alpha"}
population_size = {type = "int", description = "ES population size"}
mu_fraction = {type = "float", description = "Fraction of population to select as parents"}
initial_sigma = {type = "float", description = "Initial perturbation standard deviation"}
upload = {type = "string", optional = true, description = "Checkpoint path to load initial weights from"}
