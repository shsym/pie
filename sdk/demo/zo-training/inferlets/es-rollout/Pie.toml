[package]
name = "es-rollout"
version = "0.1.5"
description = "Perform ES rollouts — generate text with perturbed adapter"
authors = ["In Gim <in.gim@yale.edu>"]
repository = "https://github.com/pie-project/pie"
readme = "README.md"

[runtime]
core = "^0.2.0"

[parameters]
name = {type = "string", description = "Adapter name"}
system_prompt = {type = "string", description = "System prompt for generation"}
max_num_outputs = {type = "int", description = "Maximum tokens to generate per rollout"}
rollouts = {type = "string", description = "List of rollout tasks (each with uid, task, seed), as JSON"}
