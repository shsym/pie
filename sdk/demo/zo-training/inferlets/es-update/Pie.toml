[package]
name = "es-update"
version = "0.1.2"
description = "Update an Evolution Strategies adapter"
authors = ["In Gim <in.gim@yale.edu>"]
repository = "https://github.com/pie-project/pie"
readme = "README.md"

[runtime]
core = "^0.2.0"

[parameters]
name = {type = "string", description = "Adapter name to update"}
seeds = {type = "array", description = "Population seeds"}
scores = {type = "array", description = "Fitness scores (one per seed)"}
max_sigma = {type = "float", description = "Maximum sigma for adaptive noise scaling"}
download = {type = "string", optional = true, description = "Checkpoint name to save updated adapter"}
