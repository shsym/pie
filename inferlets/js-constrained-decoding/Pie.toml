[package]
name = "js-constrained-decoding"
version = "0.1.0"
description = "Grammar-constrained JSON generation in JavaScript via Schema.jsonSchema"
authors = ["Pie Team"]

[runtime]
core = "^0.2.0"
mcp = "^0.2.0"

[parameters]
prompt = {type = "string", optional = true, description = "Description of what to generate"}
max_tokens = {type = "int", optional = true, description = "Max generation tokens (default: 512)"}
