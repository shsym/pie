[package]
name = "best-of-n"
version = "0.1.0"
description = "Best-of-N generation with diversity ranking via string similarity"
authors = ["Pie Team"]

[runtime]
core = "^0.2.0"
mcp = "^0.2.0"

[parameters]
question = {type = "string", optional = true, description = "The question to answer (default: 'What is 17 * 24 + 13?')"}
num_candidates = {type = "int", optional = true, description = "Number of parallel candidates (default: 5)"}
max_tokens = {type = "int", optional = true, description = "Max tokens per candidate (default: 1024)"}
