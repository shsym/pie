[package]
name = "json-schema-validation"
version = "0.1.0"
description = "Grammar-constrained JSON generation with schema validation + retry-with-feedback"
authors = ["Pie Team"]

[runtime]
core = "^0.2.0"
mcp = "^0.2.0"

[parameters]
prompt = {type = "string", optional = true, description = "Description of what to generate"}
max_retries = {type = "int", optional = true, description = "Max validation/retry cycles (default: 3)"}
max_tokens = {type = "int", optional = true, description = "Max tokens per attempt (default: 512)"}
